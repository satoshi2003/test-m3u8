name: Update M3U Playlist

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run M3U_list.py
        run: python M3U_list.py

      - name: List files after script
        run: ls -la

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        run: |
          BRANCH=$(git branch --show-current)
          if [ -z "$BRANCH" ]; then
            if git show-ref --verify --quiet refs/heads/main; then
              BRANCH="main"
            elif git show-ref --verify --quiet refs/heads/master; then
              BRANCH="master"
            else
              echo "Could not determine branch name"
              exit 1
            fi
          fi
          echo "Current branch: $BRANCH"
          # Kiểm tra file output.m3u có tồn tại không
          if [ ! -f output.m3u ]; then
            echo "File output.m3u not found!"
            exit 1
          fi
          git add output.m3u
          # Kiểm tra xem có thay đổi không
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Auto-update playlist $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          git pull --rebase origin "$BRANCH"
          git push origin "$BRANCH"
